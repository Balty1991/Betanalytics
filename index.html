<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetAnalytics Ultra</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

textarea{
width:100%;
background:#0f172a;
color:white;
border:1px solid #334155;
padding:10px;
border-radius:6px;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

.safe{color:#22c55e;font-weight:bold}
.medium{color:#facc15;font-weight:bold}
.risk{color:#ef4444;font-weight:bold}

</style>
</head>

<body>

<div class="container">

<h1>BetAnalytics Ultra</h1>

<div class="card">

<h2>Import meciuri (JSON)</h2>

<textarea id="dataInput" rows="8">

[
{
"home":"Ajax",
"away":"Utrecht",
"home_scored_avg":2.1,
"away_scored_avg":1.6,
"home_conceded_avg":1.2,
"away_conceded_avg":1.5,
"home_over15":0.88,
"away_over15":0.85,
"home_last5":10,
"away_last5":8,
"home_ht":1.1,
"away_ht":0.9
}
]

</textarea>

<br><br>

<button onclick="analyze()">Analizează meciuri</button>

</div>


<div class="card">

<h2>Top meciuri +1.5 goluri</h2>

<table id="topTable">

<thead>
<tr>
<th>Meci</th>
<th>xG estimat</th>
<th>AI Score</th>
<th>Probabilitate</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="card">

<h2>Biletul zilei (~cota 1.4)</h2>

<table id="ticketTable">

<thead>
<tr>
<th>Meci</th>
<th>Pronostic</th>
<th>AI Score</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

function calcXG(m){

let home_xg=(m.home_scored_avg+m.away_conceded_avg)/2
let away_xg=(m.away_scored_avg+m.home_conceded_avg)/2

return home_xg+away_xg

}

function calcScore(m){

let xg=calcXG(m)

let consistency=(m.home_over15+m.away_over15)/2

let form=(m.home_last5+m.away_last5)/10

let defense=(m.home_conceded_avg+m.away_conceded_avg)/2

let ht=(m.home_ht+m.away_ht)/2

let score=
(xg*30)+
(consistency*25)+
(form*15)+
(defense*15)+
(ht*15)

return Math.round(score)

}

function probability(score){

let p=Math.min(95,Math.max(50,score))

return p+"%"

}

function classify(score){

if(score>=85) return "safe"
if(score>=70) return "medium"
return "risk"

}

function analyze(){

let raw=document.getElementById("dataInput").value

let matches=JSON.parse(raw)

matches.forEach(m=>{

m.xg=calcXG(m)
m.score=calcScore(m)

})

matches.sort((a,b)=>b.score-a.score)

renderTop(matches)
generateTicket(matches)

}

function renderTop(matches){

let tbody=document.querySelector("#topTable tbody")

tbody.innerHTML=""

matches.slice(0,10).forEach(m=>{

let row=document.createElement("tr")

row.innerHTML=

"<td>"+m.home+" vs "+m.away+"</td>"+
"<td>"+m.xg.toFixed(2)+"</td>"+
"<td class='"+classify(m.score)+"'>"+m.score+"</td>"+
"<td>"+probability(m.score)+"</td>"

tbody.appendChild(row)

})

}

function generateTicket(matches){

let tbody=document.querySelector("#ticketTable tbody")

tbody.innerHTML=""

let filtered=matches.filter(m=>m.score>82)

let ticket=filtered.slice(0,4)

ticket.forEach(m=>{

let row=document.createElement("tr")

row.innerHTML=

"<td>"+m.home+" vs "+m.away+"</td>"+
"<td>+1.5 goluri</td>"+
"<td>"+m.score+"</td>"

tbody.appendChild(row)

})

}

</script>

</body>
</html>
